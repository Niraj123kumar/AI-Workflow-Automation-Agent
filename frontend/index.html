<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Workflow Agent</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e0e0e0;height:100vh;display:flex;overflow:hidden;}
  #sidebar{width:260px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-right:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;padding:16px;gap:12px;}
  #sidebar h2{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  #new-chat-btn{background:linear-gradient(135deg,#3182ce,#6b46c1);color:white;border:none;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;text-align:center;}
  #new-chat-btn:hover{opacity:0.9;}
  #history-list,#notif-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .history-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;color:#bbb;}
  .history-item:hover{background:rgba(255,255,255,0.1);}
  .history-item .cmd{color:#e0e0e0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .history-item .meta{color:#666;font-size:11px;margin-top:2px;}
  .notif-item{background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.2);border-radius:8px;padding:8px 10px;font-size:12px;color:#90cdf4;}
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #topbar{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02);}
  #topbar h1{font-size:18px;font-weight:600;background:linear-gradient(90deg,#63b3ed,#b794f4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  #user-badge{font-size:12px;color:#888;background:rgba(255,255,255,0.07);padding:4px 12px;border-radius:20px;}
  #chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
  .msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,#3182ce,#6b46c1);color:white;border-bottom-right-radius:4px;}
  .msg.agent{align-self:flex-start;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#e0e0e0;border-bottom-left-radius:4px;}
  .msg.agent .intent-badge{display:inline-block;background:rgba(99,179,237,0.15);color:#63b3ed;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:6px;}
  .msg.agent .trace{font-size:11px;color:#555;margin-top:6px;}
  .msg.thinking{align-self:flex-start;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#666;font-style:italic;}
  #input-area{padding:16px 24px;border-top:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);}
  #input-row{display:flex;gap:10px;align-items:flex-end;}
  #command{flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#e0e0e0;padding:12px 16px;border-radius:12px;font-size:14px;resize:none;font-family:inherit;outline:none;}
  #command:focus{border-color:rgba(99,179,237,0.5);}
  #send-btn{background:linear-gradient(135deg,#3182ce,#6b46c1);color:white;border:none;padding:12px 20px;border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap;}
  #send-btn:hover{opacity:0.9;}
  #file-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  #file-input{display:none;}
  #file-label{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#aaa;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;}
  #file-label:hover{background:rgba(255,255,255,0.12);}
  #file-name{font-size:12px;color:#666;}
  #login-overlay{position:fixed;inset:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:100;}
  .login-box{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;width:360px;display:flex;flex-direction:column;gap:16px;}
  .login-box h2{font-size:22px;font-weight:600;background:linear-gradient(90deg,#63b3ed,#b794f4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
  .login-box input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:#e0e0e0;padding:12px 16px;border-radius:10px;font-size:14px;outline:none;width:100%;}
  .login-box input:focus{border-color:rgba(99,179,237,0.5);}
  .login-box button{background:linear-gradient(135deg,#3182ce,#6b46c1);color:white;border:none;padding:12px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;}
  .login-box button:hover{opacity:0.9;}
  #login-error{color:#fc8181;font-size:13px;text-align:center;display:none;}
  .tab-row{display:flex;gap:8px;margin-bottom:8px;}
  .tab{font-size:12px;padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);color:#888;background:none;}
  .tab.active{background:rgba(99,179,237,0.15);color:#63b3ed;border-color:rgba(99,179,237,0.3);}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
</style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2>AI Workflow Agent</h2>
    <input id="lu" placeholder="Username" value="admin"/>
    <input id="lp" type="password" placeholder="Password" value="admin123"/>
    <button onclick="doLogin()">Login</button>
    <div id="login-error">Invalid credentials</div>
  </div>
</div>

<div id="sidebar">
  <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
  <div>
    <div class="tab-row">
      <div class="tab active" onclick="switchTab('history', event)">History</div>
      <div class="tab" onclick="switchTab('notifs', event)">Alerts</div>
    </div>
  </div>
  <div id="history-list"></div>
  <div id="notif-list" style="display:none"></div>
</div>

<div id="main">
  <div id="topbar">
    <h1>AI Workflow Agent</h1>
    <span id="user-badge">not logged in</span>
  </div>
  <div id="chat-area"></div>
  <div id="input-area">
    <div id="file-row">
      <label id="file-label" for="file-input">+ Attach File</label>
      <input id="file-input" type="file" accept=".txt,.csv" onchange="handleFile(this)"/>
      <span id="file-name">no file selected</span>
    </div>
    <div id="input-row">
      <textarea id="command" rows="2" placeholder="Type a command... e.g. Summarize AI trends / Schedule meeting / Analyze CSV"></textarea>
      <button id="send-btn" onclick="runWorkflow()">Send</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8000";
let currentUser = "";
let uploadedFileId = null;

async function doLogin() {
  const u = document.getElementById("lu").value;
  const p = document.getElementById("lp").value;
  const res = await fetch(`${API}/login`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
  const data = await res.json();
  if (data.success) {
    currentUser = u;
    document.getElementById("login-overlay").style.display = "none";
    document.getElementById("user-badge").textContent = u;
    loadHistory();
    loadNotifs();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
}

function newChat() {
  document.getElementById("chat-area").innerHTML = "";
  document.getElementById("command").value = "";
  uploadedFileId = null;
  document.getElementById("file-name").textContent = "no file selected";
  document.getElementById("file-input").value = "";
}

async function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById("file-name").textContent = file.name;
  const formData = new FormData();
  formData.append("file", file);
  const res = await fetch(`${API}/upload`, {method:"POST",body:formData});
  const data = await res.json();
  uploadedFileId = data.file_id;
  addMsg("agent", `File uploaded: <b>${data.filename}</b><br><span style="color:#888;font-size:12px">${data.preview.slice(0,100)}...</span>`);
  showNotif(`File uploaded: ${data.filename}`);
}

async function runWorkflow() {
  let command = document.getElementById("command").value.trim();
  if (!command) return;
  if (uploadedFileId) command += ` [file_id:${uploadedFileId}]`;
  addMsg("user", command);
  document.getElementById("command").value = "";
  uploadedFileId = null;
  document.getElementById("file-name").textContent = "no file selected";
  const thinking = addMsg("thinking", "thinking...");
  const res = await fetch(`${API}/run-workflow`, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({command,username:currentUser})});
  const data = await res.json();
  pollResult(data.trace_id, thinking);
  loadNotifs();
}

function pollResult(traceId, thinkingEl) {
  let attempts = 0;
  const interval = setInterval(async () => {
    attempts++;
    const res = await fetch(`${API}/result/${traceId}`);
    const result = await res.json();
    if (result.status === "completed" || attempts > 15) {
      clearInterval(interval);
      thinkingEl.remove();
      addMsg("agent", `<span class="intent-badge">${result.intent || "unknown"}</span><br>${result.result || "No result"}<div class="trace">trace: ${traceId.slice(0,8)}... | ${result.completed_at ? result.completed_at.slice(0,19) : ""}</div>`);
      loadHistory();
      showNotif(`Done: ${(result.result||"").slice(0,40)}`);
    }
  }, 2000);
}

function addMsg(type, html) {
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerHTML = html;
  document.getElementById("chat-area").appendChild(div);
  document.getElementById("chat-area").scrollTop = 99999;
  return div;
}

async function loadHistory() {
  const res = await fetch(`${API}/logs`);
  const logs = await res.json();
  const el = document.getElementById("history-list");
  el.innerHTML = "";
  logs.slice(0,20).forEach(l => {
    const d = document.createElement("div");
    d.className = "history-item";
    d.innerHTML = `<div class="cmd">${l.command.slice(0,50)}</div><div class="meta">${l.status} · ${l.timestamp.slice(0,16)}</div>`;
    d.onclick = () => { document.getElementById("command").value = l.command; };
    el.appendChild(d);
  });
}

async function loadNotifs() {
  const res = await fetch(`${API}/notifications`);
  const notifs = await res.json();
  const el = document.getElementById("notif-list");
  el.innerHTML = "";
  notifs.forEach(n => {
    const d = document.createElement("div");
    d.className = "notif-item";
    d.textContent = n.message;
    el.appendChild(d);
  });
}

function showNotif(msg) {
  const el = document.createElement("div");
  el.style.cssText = "position:fixed;top:20px;right:20px;background:rgba(99,179,237,0.15);border:1px solid rgba(99,179,237,0.3);color:#90cdf4;padding:10px 16px;border-radius:10px;font-size:13px;z-index:999;backdrop-filter:blur(10px);";
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function switchTab(tab, event) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("history-list").style.display = tab === "history" ? "flex" : "none";
  document.getElementById("notif-list").style.display = tab === "notifs" ? "flex" : "none";
}
</script>
</body>
</html>
